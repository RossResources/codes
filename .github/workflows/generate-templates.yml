name: Generate templates.json

on:
  push:
    branches: [ main ]
    paths-ignore:
      # Prevent re-triggering when the Action itself commits templates.json
      - 'assets/templates.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run generator
        run: node scripts/generate_templates.js

      - name: Commit templates.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add assets/templates.json
            git commit -m "chore: regenerate assets/templates.json"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
